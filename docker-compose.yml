# AI-OS CC2 — Docker Compose
# Usage:
#   docker compose up -d          # start in background
#   docker compose logs -f        # stream logs
#   docker compose down           # stop

services:
  aios:
    build: .
    image: aios-cc2:latest
    container_name: aios-cc2
    ports:
      - "1313:1313"
    volumes:
      - aios_data:/data
    environment:
      - AIOS_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:1313/api/heartbeat', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  aios_data:
    driver: local
